name: Market Scanner

on:
  schedule:
    - cron: '*/5 * * * *'     # Every 5 minutes for fast dry-run
  workflow_dispatch:            # Manual trigger

concurrency:
  group: engine-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements-core.txt'

      - name: Install core dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-core.txt

      - name: Run scan cycle
        env:
          DATABASE_PATH:             data/trades.db
          LESSONS_PATH:              data/lessons.json
          ENGINE_CONFIG:             configs/engine.yaml
          DRY_RUN:                   ${{ vars.DRY_RUN || 'true' }}
        run: python scripts/run_scan_cycle.py

      - name: Update Dashboard
        run: python scripts/update_dashboard.py || true

      - name: Commit state changes
        run: |
          git config user.name "polymarket-engine[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/last_scan.json data/trades.db data/lessons.json dashboard.html configs/engine.yaml 2>/dev/null || true
          git diff --cached --quiet || git commit -m "auto(scan): $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || true