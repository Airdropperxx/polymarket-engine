name: Market Scanner

on:
  schedule:
    - cron: '*/5 * * * *'     # Every 5 minutes for fast dry-run
  workflow_dispatch:            # Manual trigger

concurrency:
  group: engine-scan            # FIXED: separate group from resolve/review
  cancel-in-progress: false     # Queue, don't cancel

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15         # FIXED: was 8 — model download needs ~4 min

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      # ADDED: Cache HuggingFace model (~80MB all-MiniLM-L6-v2)
      # Without this, the model downloads fresh every run (~2-4 min wasted)
      - name: Cache HuggingFace models
        uses: actions/cache@v3
        with:
          path: ~/.cache/huggingface/hub
          key: hf-all-MiniLM-L6-v2-v1
          restore-keys: |
            hf-all-MiniLM-L6-v2-

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install numpy>=1.24.0 requests==2.31.0 pyyaml==6.0.1 python-dotenv==1.0.1 tenacity==8.2.3 structlog==24.1.0
          pip install sqlalchemy==2.0.28 PyGithub==2.1.1
          pip install py-clob-client==0.16.0 --no-deps
          pip install web3==6.14.0 --no-deps
          pip install aiohttp==3.9.3 anthropic==0.25.0 python-telegram-bot==21.0 || true

      - name: Run scan cycle
        env:
          POLYMARKET_API_KEY:        ${{ secrets.POLYMARKET_API_KEY }}
          POLYMARKET_API_SECRET:     ${{ secrets.POLYMARKET_API_SECRET }}
          POLYMARKET_PASSPHRASE:     ${{ secrets.POLYMARKET_PASSPHRASE }}
          POLYMARKET_WALLET_ADDRESS: ${{ secrets.POLYMARKET_WALLET_ADDRESS }}
          POLYMARKET_PRIVATE_KEY:    ${{ secrets.POLYMARKET_PRIVATE_KEY }}
          POLYGON_RPC_URL:           ${{ secrets.POLYGON_RPC_URL }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
          DATABASE_PATH:             data/trades.db
          LESSONS_PATH:              data/lessons.json
          ENGINE_CONFIG:             configs/engine.yaml
          DRY_RUN:                   ${{ vars.DRY_RUN || 'true' }}
        run: python scripts/run_scan_cycle.py

      - name: Update Dashboard
        run: |
          python scripts/update_dashboard.py || true

      - name: Commit state changes
        run: |
          git config user.name "polymarket-engine[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/trades.db data/lessons.json data/s8_direction_cache.json configs/engine.yaml 2>/dev/null || true
          git diff --cached --quiet || git commit -m "auto(scan): state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || true
