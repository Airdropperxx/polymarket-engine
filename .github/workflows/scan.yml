name: Market Scanner

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 min — 288 scans/day
  workflow_dispatch:

concurrency:
  group: engine-state
  cancel-in-progress: false   # queue, never cancel — every scan is data

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8        # startup ~2min + scan ~10s + buffer

    env:
      PYTHONPATH:                ${{ github.workspace }}
      POLYMARKET_API_KEY:        ${{ secrets.POLYMARKET_API_KEY }}
      POLYMARKET_API_SECRET:     ${{ secrets.POLYMARKET_API_SECRET }}
      POLYMARKET_PASSPHRASE:     ${{ secrets.POLYMARKET_PASSPHRASE }}
      POLYMARKET_WALLET_ADDRESS: ${{ secrets.POLYMARKET_WALLET_ADDRESS }}
      POLYMARKET_PRIVATE_KEY:    ${{ secrets.POLYMARKET_PRIVATE_KEY }}
      POLYGON_RPC_URL:           ${{ secrets.POLYGON_RPC_URL }}
      ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
      TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
      DRY_RUN:                   ${{ vars.DRY_RUN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements-scan.txt'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-scan.txt

      - name: Configure git
        run: |
          git config user.email "engine@polymarket-bot"
          git config user.name "Polymarket Engine"

      - name: Run scan cycle
        run: python scripts/run_scan_cycle.py
