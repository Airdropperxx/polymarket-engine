name: Market Scanner

on:
  schedule:
    - cron: '*/5 * * * *'     # Every 5 minutes for fast dry-run
  workflow_dispatch:            # Manual trigger
  push:                        # Also run on push for immediate updates

concurrency:
  group: engine-scan
  cancel-in-progress: true     # Cancel in-progress to save minutes

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 3         # 3 min timeout for speed

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-core.txt --quiet

      - name: Run scan cycle
        run: python scripts/run_scan_cycle.py
        env:
          DATABASE_PATH: data/trades.db
          LESSONS_PATH:  data/lessons.json
          ENGINE_CONFIG: configs/engine.yaml
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}

      - name: Update Dashboard
        run: python scripts/update_dashboard.py || true

      - name: Commit state changes
        run: |
          git config user.name "polymarket-engine[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/last_scan.json data/trades.db data/lessons.json dashboard.html 2>/dev/null || true
          git diff --cached --quiet || git commit -m "auto(scan): $(date -u +%Y-%m-%dT%H:%M:%SZ)" || true
          git push || true
