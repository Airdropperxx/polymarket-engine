name: Daily AI Review

on:
  schedule:
    - cron: '0 0 * * *'        # Midnight UTC
  workflow_dispatch:

concurrency:
  group: engine-review          # FIXED: own group
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run daily review
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DATABASE_PATH:      data/trades.db
          LESSONS_PATH:       data/lessons.json
          ENGINE_CONFIG:      configs/engine.yaml
        run: python scripts/run_daily_review.py

      - name: Commit updated lessons + config
        run: |
          git config user.name "polymarket-engine[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/lessons.json configs/engine.yaml 2>/dev/null || true
          git diff --cached --quiet || git commit -m "auto(reviewer): daily review $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || true
