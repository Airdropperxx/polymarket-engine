name: Resolution Check

on:
  schedule:
    - cron: '15 * * * *'   # Every hour at :15 (offset from scan at :00/:30)
  workflow_dispatch:

concurrency:
  group: engine-state
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      POLYMARKET_API_KEY:        ${{ secrets.POLYMARKET_API_KEY }}
      POLYMARKET_API_SECRET:     ${{ secrets.POLYMARKET_API_SECRET }}
      POLYMARKET_PASSPHRASE:     ${{ secrets.POLYMARKET_PASSPHRASE }}
      POLYMARKET_WALLET_ADDRESS: ${{ secrets.POLYMARKET_WALLET_ADDRESS }}
      POLYMARKET_PRIVATE_KEY:    ${{ secrets.POLYMARKET_PRIVATE_KEY }}
      POLYGON_RPC_URL:           ${{ secrets.POLYGON_RPC_URL }}
      ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
      TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
      DRY_RUN:                   ${{ vars.DRY_RUN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.email "engine@polymarket-bot"
          git config user.name "Polymarket Engine"

      - name: Check resolutions
        run: python scripts/check_resolutions.py
