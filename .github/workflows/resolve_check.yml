name: Resolution Check

on:
  schedule:
    - cron: '0 * * * *'        # Every hour on the hour
  workflow_dispatch:

concurrency:
  group: engine-resolve         # FIXED: own group, no longer queues behind scan
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Check resolutions
        env:
          POLYMARKET_API_KEY:    ${{ secrets.POLYMARKET_API_KEY }}
          POLYMARKET_API_SECRET: ${{ secrets.POLYMARKET_API_SECRET }}
          POLYMARKET_PASSPHRASE: ${{ secrets.POLYMARKET_PASSPHRASE }}
          POLYMARKET_PRIVATE_KEY: ${{ secrets.POLYMARKET_PRIVATE_KEY }}
          POLYGON_RPC_URL:       ${{ secrets.POLYGON_RPC_URL }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          DATABASE_PATH:         data/trades.db
          LESSONS_PATH:          data/lessons.json
          ENGINE_CONFIG:         configs/engine.yaml
        run: python scripts/check_resolutions.py

      - name: Commit state
        run: |
          git config user.name "polymarket-engine[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/trades.db data/lessons.json configs/engine.yaml 2>/dev/null || true
          git diff --cached --quiet || git commit -m "auto(resolve): state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || true
