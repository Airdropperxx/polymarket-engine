name: Bootstrap GitHub Issues

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type BOOTSTRAP to confirm creating all issues'
        required: true

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event.inputs.confirm == 'BOOTSTRAP' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install PyGithub pyyaml

      - name: Create labels, milestones, and issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO:  ${{ github.event.repository.name }}
        run: python scripts/bootstrap_github.py
