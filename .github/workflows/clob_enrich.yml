name: CLOB Enrichment

on:
  schedule:
    - cron: '2-57/5 * * * *'  # offset by 2min so it runs AFTER scan (which runs at :00/:05/:10...)
  workflow_dispatch:

concurrency:
  group: clob-enrich
  cancel-in-progress: true   # if we get behind, skip — next run will catch up

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements-scan.txt'

      - name: Install dependencies
        run: pip install -q -r requirements-scan.txt

      - name: Configure git
        run: |
          git config user.email "engine@polymarket-bot"
          git config user.name "Polymarket Engine"

      - name: Enrich top opportunities with CLOB data
        run: python scripts/clob_enrich.py

      - name: Commit enriched data
        run: |
          git add data/enriched_opportunities.json || true
          git diff --cached --quiet || git commit -m "enrich: CLOB orderbook data [automated]"
          git push || true
