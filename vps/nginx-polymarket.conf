# /etc/nginx/sites-available/polymarket
# Serves the dashboard (index.html) from the VPS directly.
# No GitHub Pages needed — dashboard updates on every scan cycle.

server {
    listen 80;
    listen [::]:80;
    server_name _;   # Replace with your domain if you have one

    root /opt/polymarket-engine;
    index index.html;

    # Dashboard — serve index.html directly
    location / {
        try_files $uri $uri/ /index.html;
        # Prevent caching — dashboard data changes every 5 min
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Last-Modified "";
    }

    # Serve data/ folder (scan_log, trades summary) — read-only
    location /data/ {
        alias /opt/polymarket-engine/data/;
        autoindex off;
        # Only expose the dashboard state, not the raw DB
        location ~* \.db$ { deny all; }
        location ~* \.json.gz$ { deny all; }
    }

    # Block access to sensitive files
    location ~* (\.env|\.git|configs/\.env|requirements) {
        deny all;
        return 404;
    }

    # Health check endpoint
    location /health {
        default_type text/plain;
        return 200 "ok";
    }

    # Gzip for faster dashboard loads
    gzip on;
    gzip_types text/html application/json application/javascript text/css;
}