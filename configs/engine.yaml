engine:
  version: "3.1"
  capital_usdc: 100.00
  dry_run: false        # OVERRIDE with DRY_RUN=true env var for testing

  # How many new trades to execute per scan cycle (prevents over-trading)
  max_per_cycle: 3

  # Scan interval — must match GitHub Actions cron (30 min)
  poll_interval_seconds: 1800

  risk:
    max_position_pct: 0.15        # 15% of bankroll per trade = $15
    max_daily_loss_pct: 0.05      # halt trading if daily loss > 5% = $5
    max_open_positions: 5         # never hold more than 5 simultaneous positions
    min_edge_after_fees: 0.005    # 0.5% minimum net edge (overridden per strategy)

  # Capital allocation across strategies (must sum to 1.0)
  allocations:
    s10_near_resolution: 0.40    # $40 — safest, fastest-cycling strategy
    s1_negrisk_arb: 0.40         # $40 — true arb, ~100% win rate when it fires
    s8_logical_arb: 0.20         # $20 — higher risk (LLM can err), lower allocation

  monitoring:
    telegram_alerts: true
    alert_on:
      - trade_executed
      - daily_summary
      - risk_limit_hit
      - error
      - lesson_update
