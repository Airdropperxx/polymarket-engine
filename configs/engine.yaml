engine:
  version: "0.1.0"
  capital_usdc: 100.00
  dry_run: true
  # GitHub Actions: 5-min poll for faster dry-run testing
  # Production: use 30 min (public repo, unlimited minutes)
  poll_interval_seconds: 300         # 5 minutes

  max_per_cycle: 3                   # Max new trades per scan cycle

risk:
  max_position_pct: 0.15             # Max 15% of total capital per trade ($15 at $100)
  max_daily_loss_pct: 0.05           # 5% daily loss = $5 → engine halts until next day
  max_open_positions: 5              # Never hold more than 5 positions simultaneously
  min_edge_after_fees: 0.025         # Minimum 2.5% net edge required after fees to enter

allocations:                         # Must sum to exactly 1.0
  s10_near_resolution: 0.40          # $40 — safest, fastest resolution
  s1_negrisk_arb:      0.40          # $40 — guaranteed arb, zero directional risk
  s8_logical_arb:      0.20          # $20 — slower windows, LLM-dependent

monitoring:
  telegram_alerts: true
  alert_on:
    - trade_executed
    - daily_summary
    - risk_limit_hit
    - error
    - lesson_update
