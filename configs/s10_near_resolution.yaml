s10_near_resolution:
  enabled: true
  max_minutes_remaining: 10080       # up to 7 days out
  min_probability: 0.85
  max_probability: 0.989             # exclude effectively-resolved markets
  min_volume_24h: 100.0              # low floor — observer pre-filters quality
  max_spread: 0.05
  min_edge_after_fees: 0.001         # very low: capture near-cert markets
  max_position_pct: 0.40
  kelly_fraction: 0.25
  threshold: 0.25
  # Observer integration: resolution_drift signals pre-prioritise scan
  observer_boost: true               # when true, drift-signal markets scanned first
  review:
    track_metrics: [win_rate, avg_roi, avg_days_left, category_breakdown]
    rebalance_trigger: weekly
