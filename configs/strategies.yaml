# configs/strategies.yaml
# Thresholds calibrated against live Polymarket data (March 2026)

s10_near_resolution:
  enabled: true

  # 7-day window captures end-of-month markets (Apple, BTC price, sports finals)
  # These are the richest source of S10 opportunities
  max_minutes_remaining: 10080   # 7 days = 7*24*60 = 10080 minutes

  # Real Polymarket high-prob markets: AAPL 98%, Lebanon 98%, BTC milestones 100%
  min_probability: 0.85          # catches 85%+ certainty markets

  # Low volume floor - many good markets have $100-500/day
  min_volume_24h: 100.0          # USDC

  # Wider spread allowed - synthetic 1% spread means ask = price + 0.01
  max_spread: 0.05               # 5 cents max spread

  # At p=0.95 fees are tiny (~0.5%). Edge of 0.001 = 0.1% is still profitable
  min_edge_after_fees: 0.001

  max_position_pct: 0.15         # 15% of bankroll = $15 max
  kelly_fraction: 0.25           # quarter-Kelly

  # Score threshold: low because we want to surface opportunities for dry-run review
  threshold: 0.30

  review:
    track_metrics: [win_rate, avg_roi, avg_days_left, category_breakdown]
    rebalance_trigger: weekly

---
s1_negrisk_arb:
  enabled: true

  # Real NegRisk: FIFA World Cup winner (15% Spain + others), 
  # NCAA basketball brackets, election outcomes
  min_edge_after_fees: 0.005     # 0.5% after fees
  min_leg_volume_24h: 50.0       # USDC - lower floor for sports markets
  min_leg_bid: 0.01              # reject zero-bid stale markets
  max_group_legs: 20             # FIFA has 32 teams
  max_position_pct: 0.15
  threshold: 0.40

  review:
    track_metrics: [win_rate, avg_edge, avg_num_legs, fill_rate]
    rebalance_trigger: weekly

---
s8_logical_arb:
  enabled: false                 # needs torch - disabled at MVP
  min_edge_after_fees: 0.030
  similarity_threshold: 0.75
  min_volume_24h: 300.0
  max_llm_calls_per_scan: 5
  priority_categories: [politics, other, crypto, sports]
  max_position_pct: 0.15
  kelly_fraction: 0.25
  threshold: 0.65

  review:
    track_metrics: [win_rate, avg_yes_sum, avg_similarity]
    rebalance_trigger: weekly
