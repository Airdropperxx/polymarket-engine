# configs/strategies.yaml
# Consolidated strategy configuration — loaded by test_all.py and signal_engine.
# Each strategy is a separate YAML document (separated by ---).

---
s10_near_resolution:
  enabled: true
  max_minutes_remaining: 1440    # 24 hours — must be minutes not seconds (15–1440 range)
  min_probability: 0.85
  max_probability: 0.989
  min_volume_24h: 100.0
  max_spread: 0.05
  min_edge_after_fees: 0.001
  max_position_pct: 0.40
  kelly_fraction: 0.25
  threshold: 0.25
  observer_boost: true
  review:
    track_metrics: [win_rate, avg_roi, avg_days_left, category_breakdown]
    rebalance_trigger: weekly

---
s1_negrisk_arb:
  enabled: true
  min_edge_after_fees: 0.005
  min_leg_volume_24h: 1000.0
  min_leg_bid: 0.01
  min_leg_price: 0.03
  max_leg_price: 0.97
  max_group_legs: 20
  max_position_pct: 0.40
  threshold: 0.30
  review:
    track_metrics: [win_rate, avg_edge, avg_num_legs]
    rebalance_trigger: weekly

---
s11_inplay_momentum:
  enabled: true
  min_total_move: 0.08
  min_volume_24h: 5000.0
  min_price_after_move: 0.55
  max_price_after_move: 0.95
  max_days_to_resolution: 3.0
  min_observations: 2
  min_edge_after_fees: 0.003
  max_position_pct: 0.15
  kelly_fraction: 0.25
  threshold: 0.30
  observer_boost: true
  review:
    track_metrics: [win_rate, avg_roi, avg_move, category_breakdown]
    rebalance_trigger: weekly

---
s8_logical_arb:
  enabled: false
  min_edge_after_fees: 0.030
  similarity_threshold: 0.75
  min_volume_24h: 300.0
  max_llm_calls_per_scan: 5
  priority_categories: [politics, other, crypto, sports]
  max_position_pct: 0.15
  kelly_fraction: 0.25
  threshold: 0.65
