  # ─── TASK-012: S1 NegRisk Strategy ────────────────────────────────────────
  - id: "TASK-012"
    title: "Implement strategies/s1_negrisk_arb.py + configs/s1_negrisk.yaml"
    phase: MVP
    milestone: "v0.1.0-mvp"
    labels: ["phase:mvp", "scope:strategy", "status:todo", "size:medium", "pack:A"]
    priority: 12
    depends_on: ["TASK-005"]
    estimated_tokens: 2500
    files:
      - "strategies/s1_negrisk_arb.py"
      - "configs/s1_negrisk.yaml"
    description: |
      [CTX] NegRisk arbitrage. In multi-outcome markets (e.g. "Who wins governor?"),
      ONE candidate MUST win. If sum(YES ask prices) < $1.00, buying all YES
      guarantees $1.00 payout for less than $1.00 cost. win_probability = 1.0 always.

      LONG ARB (buy_all_yes when total_cost < 1.0):
        for group_id, group_markets in negrisk_groups.items():
            if len(group_markets) < 2: continue
            yes_prices = [m.yes_price for m in group_markets]
            total_cost = sum(yes_prices)
            if total_cost >= 1.0: continue
            gross_spread = 1.0 - total_cost
            # Fee: only winning leg pays fee. Use avg price as estimate.
            avg_p = total_cost / len(group_markets)
            fee = self.calc_fee(avg_p)
            net_spread = gross_spread - fee
            if net_spread < config['min_spread_after_fees']: continue
            # → Opportunity(action='buy_all_yes', win_probability=1.0, edge=net_spread)
            #   metadata: {'group_id': group_id, 'markets': [m.market_id for m in group_markets],
            #              'yes_prices': yes_prices, 'total_cost': total_cost}

      SHORT ARB (sell_all_yes when total YES bids > 1.0):
        yes_bids = [m.yes_bid for m in group_markets]
        total_revenue = sum(yes_bids)
        if total_revenue > 1.0 + config['min_spread_after_fees']:
            # → Opportunity(action='sell_all_yes', win_probability=1.0, edge=total_revenue - 1.0)

      score() formula:
        # NegRisk arb is always high priority. Score = edge * 2 (capped at 1.0)
        return min(opp.edge * 2.0, 1.0)

      size() formula:
        # Win prob is 1.0 → Kelly says go all-in. Use half-Kelly as safety.
        # size = bankroll * kelly_fraction (which should be 0.5 in YAML)
        # But ALSO: total_cost of buying all legs
        # If only $10 allocated and there are 5 legs at $0.20 each = $1.00 total: fine
        # Size = min(kelly_size, config['max_position_pct'] * bankroll)
        return min(bankroll * config['kelly_fraction'],
                   bankroll * config['max_position_pct'])

      configs/s1_negrisk.yaml:
        strategy: s1_negrisk_arb
        enabled: true
        min_spread_after_fees: 0.03  # 3% min net edge
        max_position_pct: 0.20       # 20% — safe since win_prob=1.0
        kelly_fraction: 0.50         # Half-Kelly — arb is risk-free
        threshold: 0.60              # Score threshold to execute
        review:
          track_metrics: [win_rate, avg_roi, group_size, category]
          rebalance_trigger: weekly

    acceptance_criteria:
      - "Long arb detected when sum(YES) = 0.70 (30% spread → after fee should be ~28.5%)"
      - "Long arb NOT found when net spread < min_spread_after_fees"
      - "Short arb detected when sum(YES bids) = 1.05"
      - "win_probability == 1.0 for ALL NegRisk opportunities"
      - "metadata contains group_id and markets list"

  # ─── TASK-013: S8 Logical Arb Strategy ────────────────────────────────────
  - id: "TASK-013"
    title: "Implement strategies/s8_logical_arb.py + configs/s8_logical.yaml"
    phase: MVP
    milestone: "v0.1.0-mvp"
    labels: ["phase:mvp", "scope:strategy", "status:todo", "size:large", "pack:A"]
