    priority: 14
    depends_on: ["TASK-002"]
    estimated_tokens: 2500
    files:
      - "engines/review_engine.py"
      - "scripts/run_daily_review.py"
    description: |
      [CTX] AI-powered learning loop. Updates lessons.json after resolutions + daily.
      Called by daily_review.yml GitHub Actions workflow.
      Uses Claude Haiku (cheap) for daily review, Sonnet for weekly deep review.

      SYSTEM PROMPT (exact — use verbatim):
        You are a quantitative trading strategy reviewer for a Polymarket prediction market engine.
        Analyze recent resolved trades and existing lessons. Output ONLY valid JSON.
        Schema: {"strategy_score_updates": {...}, "new_lessons": [...],
                 "deprecated_lesson_indices": [...], "reasoning": "..."}
        Rules:
        - Lessons must be specific and falsifiable. Vague = useless.
          BAD: "S10 sometimes loses in sports"
          GOOD: "S10 sports win rate 71% when margin < 2 goals AND time < 10 min. Tighten threshold."
        - Allocation changes: max ±0.05 per cycle. Never change more than that.
        - Min 5 trades before adjusting any strategy's allocation.
        - Deprecate only with clear contradicting evidence.

      METHODS:
        ReviewEngine.run_after_resolution(market_id: str) -> dict
          → If 0 recent resolved trades: return {'status': 'skipped', 'reason': 'no_trades'}
          → Otherwise: call Claude, parse response, apply updates, return {'status': 'updated', ...}

        ReviewEngine.run_daily_review() -> dict
          → Same as above but always runs (even if 0 trades today)
          → Uses last 7 days of resolved trades for weekly context

        ReviewEngine._apply_lesson_updates(updates: dict, lessons: dict) -> None
          → Add new_lessons to lessons['lessons'] (max 20, prune oldest if over)
          → Deprecate indices in deprecated_lesson_indices
          → Update strategy_scores with allocation_delta (enforce ±5% cap per cycle)
          → state_engine.save_lessons(lessons)

        ReviewEngine._parse_response(text: str) -> dict
          → try: json.loads(text)
          → except: regex search r'\{.*\}' with re.DOTALL → json.loads(match)
          → except: log error, return {} (NEVER crash)

      scripts/run_daily_review.py:
        #!/usr/bin/env python3
        """Entry point for daily_review.yml GitHub Actions workflow."""
        import os, sys
        sys.path.insert(0, '.')
        from dotenv import load_dotenv; load_dotenv()
        from engines.state_engine import StateEngine
        from engines.review_engine import ReviewEngine
        from engines.monitor_engine import MonitorEngine
        import yaml

        config = yaml.safe_load(open(os.environ.get('ENGINE_CONFIG', 'configs/engine.yaml')))
        state = StateEngine(os.environ.get('DATABASE_PATH', 'data/trades.db'),
                            os.environ.get('LESSONS_PATH', 'data/lessons.json'))
        monitor = MonitorEngine(config)
        review = ReviewEngine(state, config)

        result = review.run_daily_review()
        if result.get('new_lessons'):
            for lesson in result['new_lessons']:
                monitor.send('lesson_update', lesson=lesson)
        monitor.send('daily_summary',
                     pnl=state.get_daily_pnl(), balance=state.get_current_balance(),
                     trades=len(state.get_recent_resolved_trades(24)))
        sys.exit(0)

    acceptance_criteria:
      - "0 recent trades → returns status:skipped (not error)"
      - "JSON parse fallback works (test with malformed response)"
      - "Allocation delta capped at ±0.05"
      - "Lessons list never exceeds 20 items"

