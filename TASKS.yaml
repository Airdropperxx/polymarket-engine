    description: |
      [CTX] Logical impossibility arbitrage. Finds market pairs where probabilities
      violate logical constraints. E.g. P(Lakers win championship) > P(Western team wins)
      is impossible (Lakers ARE a Western team, so P(Lakers) ≤ P(Western always)).

      GITHUB ACTIONS NOTE: The classifier cache MUST be written to data/s8_direction_cache.json
      and committed to the repo. Between runs the cache is loaded from this file.
      Without this, every run re-classifies all pairs (wastes API budget).

      TWO-PHASE SCAN:

      PHASE 1 — Embedding similarity (local, free, no API):
        model = SentenceTransformer('all-MiniLM-L6-v2')  # 80MB, runs on CPU in <5s
        embeddings = model.encode([m.question for m in markets])
        # Find pairs with cosine_similarity > config['min_similarity_threshold']
        # Limit to config['max_pairs_per_scan'] pairs (control API cost)

      PHASE 2 — LLM classification (Claude Haiku, cache mandatory):
        Load cache: self._cache = json.load(open('data/s8_direction_cache.json')) or {}
        For each candidate pair where |price_a - price_b| > min_probability_gap:
            cache_key = f"{m_a.market_id}:{m_b.market_id}"
            if cache_key in self._cache: direction = self._cache[cache_key]
            else:
                direction = self._call_claude_classifier(m_a.question, m_b.question)
                self._cache[cache_key] = direction
        Save cache: json.dump(self._cache, open('data/s8_direction_cache.json', 'w'))

      CLASSIFIER PROMPT (exact — do not change):
        """Are these two prediction markets logically related?
        Market A: "{question_a}"
        Market B: "{question_b}"

        If winning market A GUARANTEES winning market B: output a_subset_of_b
        If winning market B GUARANTEES winning market A: output b_subset_of_a
        If they CANNOT both be true simultaneously: output mutually_exclusive
        Otherwise: output none

        Respond with ONLY one of: a_subset_of_b, b_subset_of_a, mutually_exclusive, none"""

      VIOLATION DETECTION:
        if direction == 'a_subset_of_b' and market_a.yes_price > market_b.yes_price:
            # BUY market_b: P(A) > P(B) but A ⊂ B → market_b underpriced
            edge = (market_a.yes_price - market_b.yes_price) - 0.02  # subtract 2% worst-case fee
            if edge > config['min_edge_after_fees']:
                → Opportunity(market_id=market_b.market_id, action='buy_yes', edge=edge,
                              win_probability=market_a.yes_price,  # should converge to at least this
                              max_payout=1.0/market_b.yes_price)

        if direction == 'b_subset_of_a' and market_b.yes_price > market_a.yes_price:
            # BUY market_a (mirror case)

      ERROR HANDLING for Anthropic API:
        On any exception from Claude API:
            log.warning("s8.classifier_error", error=str(e))
            return None  # Skip this pair. Never crash scan().

      configs/s8_logical.yaml:
        strategy: s8_logical_arb
        enabled: true
        min_similarity_threshold: 0.65  # Cosine similarity for candidate pairs
        min_probability_gap: 0.04       # 4% min gap to bother classifying
        min_edge_after_fees: 0.025      # 2.5% min net edge to trade
        max_pairs_per_scan: 30          # Limit API cost per cycle
        llm_model: "claude-haiku-4-5-20251001"
        cache_path: "data/s8_direction_cache.json"
        max_position_pct: 0.10          # Lower — uncertainty in window timing
        kelly_fraction: 0.25
        threshold: 0.50
        review:
          track_metrics: [win_rate, avg_roi, cache_hit_rate, pairs_scanned]
          rebalance_trigger: weekly

    acceptance_criteria:
