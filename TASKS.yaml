  # ─── TASK-000: GitHub Memory MCP Server ───────────────────────────────────
  - id: "TASK-000"
    title: "Build GitHub Memory MCP Server"
    phase: MVP
    milestone: "v0.1.0-mvp"
    labels: ["phase:mvp", "scope:mcp", "status:todo", "size:large", "pack:B"]
    priority: 0
    depends_on: []
    estimated_tokens: 3500
    files:
      - "mcp_server/__init__.py"
      - "mcp_server/server.py"
      - "mcp_server/github_ops.py"
      - "mcp_server/task_manager.py"
      - "mcp_server/audit.py"
      - "mcp_server/memory.py"
    description: |
      [CTX] Build the GitHub Memory MCP server. This is TASK-000 because all subsequent
      tasks are pulled and tracked via this server. It exposes 10 tools over stdio transport.

      ARCHITECTURE NOTE: This is a Model Context Protocol server using stdio transport.
      It runs locally (or in Claude desktop) and gives AI agents tools to interact with
      the GitHub repo and track their own progress.

      MCP TOOLS TO EXPOSE (all 10):
        1. get_next_task()              → Returns highest-priority unclaimed task as JSON
        2. claim_task(task_id)          → Sets issue label to status:in-progress
        3. complete_task(task_id, notes) → Closes issue, adds completion comment
        4. read_lessons()              → Returns data/lessons.json content
        5. write_lessons(content)      → Overwrites data/lessons.json, commits
        6. read_progress()             → Returns PROGRESS.md content
        7. update_progress(task_id, status, notes) → Updates PROGRESS.md
        8. get_open_positions()        → Reads data/trades.db, returns open trades
        9. get_balance()               → Reads data/trades.db balance table
        10. log_audit(event, details)  → Appends to data/audit.jsonl

      KEY IMPLEMENTATION NOTES:
      - Use PyGithub library for GitHub API calls
      - Read GITHUB_TOKEN, GITHUB_OWNER, GITHUB_REPO from environment
      - mcp_server/server.py is the entry point (stdio transport)
      - All tools must handle GitHub API errors gracefully (return error string, never crash)
      - audit.py: every tool call gets logged to data/audit.jsonl with timestamp + args

      FILE: mcp_server/server.py
      ```python
      import json, os, sys
      from mcp_server.github_ops import GitHubOps
      from mcp_server.task_manager import TaskManager
      from mcp_server.audit import AuditLog
      from mcp_server.memory import Memory

      def main():
          gh = GitHubOps(os.environ["GITHUB_TOKEN"], os.environ["GITHUB_OWNER"], os.environ["GITHUB_REPO"])
          tm = TaskManager(gh)
          audit = AuditLog("data/audit.jsonl")
          memory = Memory("data/lessons.json", gh)

          tools = {
              "get_next_task":    tm.get_next_task,
              "claim_task":       tm.claim_task,
              "complete_task":    tm.complete_task,
              "read_lessons":     memory.read,
              "write_lessons":    memory.write,
              "read_progress":    gh.read_file("PROGRESS.md"),
              "update_progress":  gh.update_progress,
              "get_open_positions": lambda: gh.read_db_query("SELECT * FROM trades WHERE status='open'"),
              "get_balance":      lambda: gh.read_db_query("SELECT current_usdc FROM balance WHERE id=1"),
              "log_audit":        audit.log,
          }
          # MCP stdio loop
          for line in sys.stdin:
              request = json.loads(line.strip())
              tool = request.get("tool")
              args = request.get("args", {})
              audit.log(tool, args)
              try:
                  result = tools[tool](**args)
              except Exception as e:
                  result = {"error": str(e)}
              print(json.dumps({"result": result}), flush=True)

      if __name__ == "__main__":
          main()
      ```

    acceptance_criteria:
      - "mcp_server starts without errors"
      - "get_next_task() returns highest-priority status:todo issue"
      - "claim_task() changes issue label to status:in-progress"
      - "complete_task() closes the issue"
      - "All 10 tools respond without crashing on error input"
