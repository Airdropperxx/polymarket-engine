  # ─── TASK-004: BaseStrategy ────────────────────────────────────────────────
  - id: "TASK-004"
    title: "Implement strategies/base.py (BaseStrategy interface)"
    phase: MVP
    milestone: "v0.1.0-mvp"
    labels: ["phase:mvp", "scope:strategy", "status:todo", "size:small", "pack:A"]
    priority: 4
    depends_on: ["TASK-003"]
    estimated_tokens: 1000
    files:
      - "strategies/__init__.py"
      - "strategies/base.py"
    description: |
      [CTX] Abstract base class ALL strategies must implement. 4 methods.
      Once written, this file NEVER changes. Strategies subclass it; engines call it.

      DATACLASSES TO DEFINE:
        @dataclass
        class Opportunity:
            strategy: str; market_id: str; market_question: str
            action: str  # 'buy_yes' | 'buy_no' | 'buy_all_yes' | 'sell_all_yes'
            edge: float                # net profit fraction after fees (must be > 0)
            win_probability: float     # 0.0–1.0 (1.0 for guaranteed arb)
            max_payout: float          # payout per $1 invested on win (must be >= 1.0)
            time_to_resolution_sec: int
            metadata: dict = field(default_factory=dict)
            score: float = 0.0         # filled by strategy.score()
            # __post_init__ validation: raise ValueError if edge<=0, prob not in [0,1], payout<1

        @dataclass
        class Resolution:
            trade_id: str; market_id: str; won: bool
            cost_usdc: float; payout_usdc: float; pnl_usdc: float; roi: float
            strategy: str; notes: str = ""

      ABSTRACT CLASS:
        class BaseStrategy(ABC):
            @property @abstractmethod
            def name(self) -> str: ...

            @abstractmethod
            def scan(self, markets: list, negrisk_groups: dict, config: dict) -> list[Opportunity]: ...

            @abstractmethod
            def score(self, opp: Opportunity, config: dict) -> float: ...

            @abstractmethod
            def size(self, opp: Opportunity, bankroll: float, config: dict) -> float: ...

            @abstractmethod
            def on_resolve(self, resolution: Resolution) -> dict: ...

            @staticmethod
            def calc_fee(p: float) -> float:
                # Polymarket dynamic taker fee formula (post-Jan 2026)
                # fee = 2.25 * 0.25 * (p * (1-p))^2
                # At p=0.50: 0.140625 (1.4063%)
                # At p=0.95: 0.000127... (~0.013%)
                return 2.25 * 0.25 * (p * (1.0 - p)) ** 2

            @staticmethod
            def calc_kelly_size(win_prob, payout_ratio, bankroll, kelly_fraction, max_position_pct) -> float:
                # Fractional Kelly with hard cap and $1 floor
                if payout_ratio <= 1.0: return 1.0
                kelly = win_prob - (1.0 - win_prob) / (payout_ratio - 1.0)
                size = bankroll * max(0.0, kelly) * kelly_fraction
                return max(1.0, min(size, bankroll * max_position_pct))

      VERIFY calc_fee is correct:
        assert abs(BaseStrategy.calc_fee(0.5) - 0.140625) < 0.0001   # 1.40625%
        assert BaseStrategy.calc_fee(0.95) < 0.001                    # near zero

    acceptance_criteria:
      - "BaseStrategy cannot be instantiated directly (ABC enforced)"
      - "calc_fee(0.5) == 0.140625"
      - "Opportunity raises ValueError on edge <= 0"
      - "Clean import: from strategies.base import BaseStrategy, Opportunity, Resolution"

  # ─── TASK-005: S10 Strategy ────────────────────────────────────────────────
  - id: "TASK-005"
    title: "Implement strategies/s10_near_resolution.py"
    phase: MVP
    milestone: "v0.1.0-mvp"
    labels: ["phase:mvp", "scope:strategy", "status:todo", "size:medium", "pack:A"]
    priority: 5
    depends_on: ["TASK-004"]
    estimated_tokens: 2000
    files:
      - "strategies/s10_near_resolution.py"
    description: |
      [CTX] Near-resolution harvesting. Buy near-certain outcomes close to resolution.
      Strategy: if yes_price >= min_probability AND time <= max_minutes → buy YES.
      Fee approaches zero near p=1, so edge is almost pure profit.
      Main risk: late sport reversals (~7% miss rate).

      CLASS TO IMPLEMENT:
        class NearResolutionStrategy(BaseStrategy):
            name = "s10_near_resolution"

            def scan(self, markets, negrisk_groups, config):
                opps = []
                for market in markets:
                    if market.seconds_to_resolution > config['max_minutes_remaining'] * 60:
                        continue
                    cat_cfg = config.get('category_rules', {}).get(market.category, config)
                    for side, p in [('buy_yes', market.yes_price), ('buy_no', market.no_price)]:
                        if p < cat_cfg.get('min_probability', config['min_probability']):
                            continue
                        fee = self.calc_fee(p)
                        edge = (1.0 - p) - fee
                        if edge < config['min_edge_after_fees']:
                            continue
                        opps.append(Opportunity(
                            strategy=self.name, market_id=market.market_id,
                            market_question=market.question, action=side,
                            edge=edge, win_probability=p,
                            max_payout=1.0 / p,
                            time_to_resolution_sec=market.seconds_to_resolution,
                            metadata={'category': market.category, 'fee_rate': fee}
                        ))
                return opps

            def score(self, opp, config):
                max_secs = config['max_minutes_remaining'] * 60
                time_urgency = 1.0 - (opp.time_to_resolution_sec / max_secs)
                # volume from metadata or default 0
                vol = opp.metadata.get('volume_24h', 0)
                volume_score = min(vol / 10000, 1.0)
                return opp.edge * 0.4 + time_urgency * 0.3 + volume_score * 0.3

            def size(self, opp, bankroll, config):
                return self.calc_kelly_size(
                    opp.win_probability, opp.max_payout,
                    bankroll, config['kelly_fraction'], config['max_position_pct']
                )

            def on_resolve(self, resolution):
                lessons = []
                if not resolution.won and resolution.roi < -0.05:
                    lessons.append(f"S10 loss on {resolution.market_id}: review category thresholds")
                return {'won': resolution.won, 'roi': resolution.roi,
