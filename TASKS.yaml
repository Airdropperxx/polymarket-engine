##############################################################################
# POLYMARKET ENGINE v3 — MASTER TASK REGISTRY
# GitHub Actions edition | $100 USDC | Public repo | Free tier
#
# HOW THIS FILE WORKS:
#   1. Run scripts/bootstrap_github.py ONCE → creates all Issues + labels + milestones
#   2. AI agents pull tasks from GitHub Issues via MCP server
#   3. Each task is self-contained (no external context needed beyond this file)
#   4. Agents mark issues done → progress is tracked in GitHub
#   5. This file is the source of truth — never edit Issues directly
##############################################################################

metadata:
  project: polymarket-engine
  version: "3.0"
  architecture: github-actions   # No VPS. No persistent process. GitHub Actions only.
  capital: 100                   # USD starting capital
  total_tasks: 28
  phases: [MVP, P2, P3]

##############################################################################
# ARCHITECTURE NOTES FOR AI AGENTS
# Read this before implementing any task.
##############################################################################
architecture_notes: |
  This engine runs ENTIRELY on GitHub Actions free tier. There is NO persistent
  process, NO VPS, NO WebSocket in the MVP phase.

  SCAN CYCLE: GitHub Actions cron job every 30 minutes.
    - Fetches markets via Polymarket REST API
    - Runs all 3 strategy scanners
    - Executes any opportunities found
    - Commits state to repo

  STATE PERSISTENCE: Everything committed to the repo.
    - data/trades.db  → SQLite, committed after every trade
    - data/lessons.json → committed after every ReviewEngine run
    - configs/engine.yaml → committed when allocations change

  CONCURRENCY: One job at a time (concurrency group: engine-state).
    - scan.yml, resolve_check.yml, daily_review.yml all share this group
    - Prevents double-execution of the same opportunity

  THE ENTRY POINT: scripts/run_scan_cycle.py
    - This is what scan.yml runs
    - It imports all engines, runs one full cycle, exits
    - No infinite loop — GitHub Actions handles the scheduling

