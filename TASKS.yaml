  # ─── TASK-009: run_scan_cycle.py (GitHub Actions entry point) ─────────────
  - id: "TASK-009"
    title: "Implement scripts/run_scan_cycle.py (GitHub Actions entry point)"
    phase: MVP
    milestone: "v0.1.0-mvp"
    labels: ["phase:mvp", "scope:engine", "status:todo", "size:small", "pack:B"]
    priority: 9
    depends_on: ["TASK-008"]
    estimated_tokens: 1000
    files:
      - "scripts/run_scan_cycle.py"
    description: |
      [CTX] The entry point that GitHub Actions runs every 30 minutes.
      It imports all engines, wires them together, runs ONE cycle, exits.
      No infinite loop — GitHub Actions cron handles the scheduling.

      COMPLETE FILE CONTENT:
        #!/usr/bin/env python3
        """
        scripts/run_scan_cycle.py
        =========================
        GitHub Actions entry point. Runs ONE scan cycle then exits.
        Called by .github/workflows/scan.yml every 30 minutes.
        """
        import os, sys
        from pathlib import Path
        from dotenv import load_dotenv

        load_dotenv()

        # Add project root to path
        sys.path.insert(0, str(Path(__file__).parent.parent))

        from py_clob_client import ClobClient
        from engines.state_engine import StateEngine
        from engines.data_engine import DataEngine
        from engines.execution_engine import ExecutionEngine
        from engines.review_engine import ReviewEngine
        from engines.monitor_engine import MonitorEngine
        from engines.signal_engine import SignalEngine
        from strategies.s10_near_resolution import NearResolutionStrategy
        from strategies.s1_negrisk_arb import NegRiskArbStrategy
        from strategies.s8_logical_arb import LogicalArbStrategy
        import yaml, structlog

        log = structlog.get_logger()

        def main():
            config = yaml.safe_load(open(os.environ.get('ENGINE_CONFIG', 'configs/engine.yaml')))
            dry_run = os.environ.get('DRY_RUN', 'false').lower() == 'true'

            # Wire up engines
            clob = ClobClient(
                host="https://clob.polymarket.com",
                key=os.environ['POLYMARKET_PRIVATE_KEY'],
                chain_id=137
            )
            state   = StateEngine(os.environ.get('DATABASE_PATH', 'data/trades.db'),
                                   os.environ.get('LESSONS_PATH', 'data/lessons.json'))
            data    = DataEngine(config)
            monitor = MonitorEngine(config)
            review  = ReviewEngine(state, config)
            execution = ExecutionEngine(clob, state, config, dry_run=dry_run)

            hub = SignalEngine(data, execution, state, review, monitor, config)
            hub.register(NearResolutionStrategy(), 'configs/s10_near_resolution.yaml')
            hub.register(NegRiskArbStrategy(),     'configs/s1_negrisk.yaml')
            hub.register(LogicalArbStrategy(),     'configs/s8_logical.yaml')

            result = hub.run_one_cycle()
            log.info("cycle.complete", **result)
            sys.exit(0)

        if __name__ == '__main__':
            main()

    acceptance_criteria:
      - "Script runs without error when DRY_RUN=true"
      - "Exits with code 0 on success"
      - "All 3 strategies registered"
      - "Structured log output includes cycle summary"

