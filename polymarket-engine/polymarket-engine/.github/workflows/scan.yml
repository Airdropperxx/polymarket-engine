name: Market Scanner

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Force dry run override'
        required: false
        default: 'true'

concurrency:
  group: engine-state
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      POLYMARKET_API_KEY:        ${{ secrets.POLYMARKET_API_KEY }}
      POLYMARKET_API_SECRET:     ${{ secrets.POLYMARKET_API_SECRET }}
      POLYMARKET_PASSPHRASE:     ${{ secrets.POLYMARKET_PASSPHRASE }}
      POLYMARKET_WALLET_ADDRESS: ${{ secrets.POLYMARKET_WALLET_ADDRESS }}
      POLYMARKET_PRIVATE_KEY:    ${{ secrets.POLYMARKET_PRIVATE_KEY }}
      POLYGON_RPC_URL:           ${{ secrets.POLYGON_RPC_URL }}
      ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
      TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
      DRY_RUN:                   ${{ vars.DRY_RUN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements-scan.txt'

      - name: Install core dependencies (~15 seconds)
        run: pip install -r requirements-scan.txt

      - name: Install trade execution deps (only when live trading)
        if: vars.DRY_RUN == 'false'
        run: pip install py-clob-client==0.16.0 web3==6.14.0

      - name: Configure git
        run: |
          git config user.email "engine@polymarket-bot"
          git config user.name "Polymarket Engine"

      - name: Run scan cycle
        run: python scripts/run_scan_cycle.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-logs-${{ github.run_number }}
          path: data/market_snapshot.json.gz
          retention-days: 3
          if-no-files-found: ignore

